# For help documentation press CTRL + SHIFT + F1

# Fonts
font_family family="IntoneMono Nerd Font"
font_size 14

# Cursor
cursor none
cursor_shape block
cursor_trail 10
cursor_trail_decay 0.1 0.2
cursor_trail_start_threshold 1

# Shell integration features
shell_integration no-cursor

# Window Layout
window_padding_width 0

# Scrolling
scrollback_lines 10000

# URL decoration
url_style straight
show_hyperlink_targets always

# Copy behavior
copy_on_select clipboard
strip_trailing_spaces smart
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Tab styles
tab_bar_edge top
tab_bar_align right
tab_bar_style slant

# Fixes for modified key mappings that Kitty just swallows or
# sends different keystrokes to applications (e.g. neovim)
map ctrl+tab send_text all \x1b[9;5u
map ctrl+shift+tab send_text all \x1b[9;6u
map ctrl+enter send_text all \x1b[13;5u
map shift+enter send_text all \x1b[13;2u
map ctrl+backspace send_text all \x1b[127;5u
map ctrl+, send_text all \x1b[44;5u
map ctrl+. send_text all \x1b[46;5u
map ctrl+/ send_text all \x1b[47;5u



# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
