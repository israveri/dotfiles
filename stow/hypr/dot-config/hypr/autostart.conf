# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = uwsm app -- qs -c noctalia-shell      # Starts Noctalia-Shell
exec-once = uwsm app -- qs -c overview            # Starts Overview so I can SUPER-Tab
exec-once = wl-paste --watch cliphist store       # Start clipboard history manager


# Allows xdg-desktop-portal-hyprland to be called when needed
# Keep at the bottom
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
