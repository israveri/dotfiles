# Start hidden
no_display

# GPU metrics
gpu_stats
gpu_load_change
vram
gpu_core_clock
gpu_mem_clock
gpu_temp
gpu_junction_temp
gpu_power
gpu_voltage
gpu_power_limit

# CPU metrics
cpu_stats
cpu_load_change
cpu_mhz
cpu_temp
cpu_power

# FPS metrics
fps
fps_metrics=avg,0.01
fps_limit_method=late
fps_limit=141,72,0
show_fps_limit

# Frametiming graph
frame_timing
frame_timing_detailed

# Info
gpu_name
resolution
gamemode
display_server
winesync
wine
arch
engine_version
present_mode

# Throttling alerts
throttling_status
throttling_status_graph

# Vsync OFF
# Using FPS Limiter to ensure smooth gameplay
vsync=1
gl_vsync=0

# Hotkeys
toggle_fps_limit=Shift_L+F1
toggle_logging=Shift_L+F2
toggle_hud_position=Shift_R+F11
toggle_hud=Shift_R+F12

# Options
position=top-left
log_duration=60
log_interval=92
output_folder="$HOME/Documents/Benchmark/mangologs/"

# Look n Feel
hud_no_margin
legacy_layout=false
background_alpha=0.5
font_size=32
font_file=/usr/share/fonts/noto/NotoSans-Black.ttf
font_glyph_ranges=korean, chinese, chinese_simplified, japanese, cyrillic, thai, vietnamese, latin_ext_a, latin_ext_b
gpu_color=2e9762
cpu_color=2e97cb
fps_color_change
fps_value=60,90
fps_color=cc0000,ffaa7f,92e79a
gpu_load_value=60,90
gpu_load_color=92e79a,ffaa7f,cc0000
cpu_load_value=60,90
cpu_load_color=92e79a,ffaa7f,cc0000
background_color=000000
frametime_color=00ff00
vram_color=ad64c1
ram_color=c26693
wine_color=eb5b5b
engine_color=eb5b5b
text_color=ffffff
media_player_color=ffffff
network_color=e07b85
battery_color=92e79a
horizontal_separator_color=ffffff
media_player_format={title};{artist};{album}
